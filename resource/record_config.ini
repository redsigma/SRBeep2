; Optional configs
;
; record_beep_mode:
;   0 = all beeps off (input capture enforcement can still run if enabled)
;   1 = plays beep and starts recording logic, optional source mute can be applied
;   2 = plays beep and waits until it finishes, then it starts recording logic
;       In mode 2, bind these in OBS Hotkeys:
;       - SRBeep2: Toggle Recording
;       - SRBeep2: Toggle Pause
record_beep_mode=0

; ========================================= Configuration for record_beep_mode=2

; record_toggle_hotkey_fallback:
;   Optional fallback for "SRBeep2: Toggle Recording" when UI hotkey is unbound.
;   UI binding always wins over this value.
;   Format example: CTRL+ALT+R
record_toggle_hotkey_fallback=

; pause_toggle_hotkey_fallback:
;   Optional fallback for "SRBeep2: Toggle Pause" when UI hotkey is unbound.
;   UI binding always wins over this value.
;   Format example: CTRL+ALT+P
pause_toggle_hotkey_fallback=

;
; ========================================= Configuration for record_beep_mode=1
;
; skip_already_muted_sources:
;   true  => keep currently-muted sources unchanged after beep (default behavior)
;   false => all listed sources are forced unmuted after mute phase ends
skip_already_muted_sources=true

; max_duration_limit:
;   maximum mute time in seconds.
;   0 disables the limit and waits until audio playback ends.
max_duration_limit=0

; sources:
;   comma-separated OBS source names to mute temporarily.
;   Example: Mic/Aux, Desktop Audio
sources=Mic/Aux

; ==================================================================================

; audio_fade_on_stop_duration:
;   when a stop event interrupts currently playing audio, fade out over
;   this many seconds before stopping (supports decimals like 0.25).
;   0 disables fade (immediate stop).
audio_fade_on_stop_duration=0.25

; enable_input_capture_enforcement:
;   true  => on recording start/unpause flow, enforce target source device selection
;   false => disables this feature
enable_input_capture_enforcement=false

; input_capture_target:
;   exact OBS source name to enforce device on.
;   Example: Audio Input Capture
input_capture_target=Audio Input Capture

; input_capture_device:
;   comma-separated preferred device-name substrings in priority order.
;   First match wins.
;   Example: Shure,Steelseries,Yeti Stereo
input_capture_device=Shure,Yeti Stereo,Blue Yeti
